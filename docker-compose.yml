

services:
  postgres:
    image: postgres:15
    container_name: intern_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: intern_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vidhikasttl

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  hasura:
    image: hasura/graphql-engine:v2.36.0
    container_name: hasura_engine
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "9090:8080"

    environment:
      
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgres://postgres:vidhikasttl@postgres:5432/intern_management
      
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:vidhikasttl@postgres:5432/intern_management
   
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"

    
      HASURA_GRAPHQL_DEV_MODE: "true"

      
      HASURA_GRAPHQL_ADMIN_SECRET: sttl6
  
  chatbot-backend:
    build: ./chatbot_service
    container_name: chatbot_backend
    restart: unless-stopped

    depends_on:
      hasura:
        condition: service_healthy

    ports:
      - "8001:8001"

    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: intern_management
      DB_USER: postgres
      DB_PASSWORD: vidhikasttl
      CHROMA_PATH: ./chroma_db
      ALLOWED_ORIGINS: "*"
    

volumes:
  postgres_data:
  